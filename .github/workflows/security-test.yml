name: IMDS Test
on: workflow_dispatch
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Azure IMDS
        run: |
          echo "=== Azure IMDS instance metadata ==="
          curl -s -H "Metadata: true" "http://169.254.169.254/metadata/instance?api-version=2021-02-01" | jq . 2>/dev/null || echo "no jq or no data"
          
          echo ""
          echo "=== Azure IMDS identity token ==="
          curl -s -H "Metadata: true" "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" 2>/dev/null | head -5
          
          echo ""
          echo "=== Azure IMDS scheduledevents ==="
          curl -s -H "Metadata: true" "http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01" 2>/dev/null | head -5
          
          echo ""
          echo "=== Network interfaces ==="
          curl -s -H "Metadata: true" "http://169.254.169.254/metadata/instance/network?api-version=2021-02-01" | jq . 2>/dev/null | head -30
          
          echo ""
          echo "=== Compute info ==="
          curl -s -H "Metadata: true" "http://169.254.169.254/metadata/instance/compute?api-version=2021-02-01" | jq "{vmId, name, resourceGroupName, subscriptionId, location, vmSize, offer, publisher, sku, version}" 2>/dev/null
